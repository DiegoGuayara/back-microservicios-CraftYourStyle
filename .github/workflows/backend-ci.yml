name: backend-ci

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  typescript-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [admin, catalogo, transacciones, gateway]
    defaults:
      run:
        working-directory: microservicios/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: microservicios/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  usuarios-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservicios/usuarios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Compile
        run: ./mvnw -q -DskipTests compile

  python-services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ["agente IA", "notificaciones"]
    defaults:
      run:
        working-directory: microservicios/${{ matrix.service }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Syntax check
        run: |
          python -m compileall -q app

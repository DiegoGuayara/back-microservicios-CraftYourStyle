spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# RabbitMQ Configuration
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
app.rabbitmq.enabled=${RABBITMQ_ENABLED:false}

# RabbitMQ Queue/Exchange names
rabbitmq.exchange.name=craftyourstyle.events
rabbitmq.queue.consume=usuarios.transaccion.queue
rabbitmq.routing.key.consume=transaccion.usuario.actualizar
rabbitmq.routing.key.publish=usuario.evento

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Frontend URL for email links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# Firebase Configuration
firebase.enabled=${FIREBASE_ENABLED:true}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:src/main/resources/serviceAccountKey.json}
